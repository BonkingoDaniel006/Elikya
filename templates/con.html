{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<h2>Connexion</h2>
<form method="POST" action="{{ url_for('auth.connexion') }}">
    <label for="email">Adresse Email</label>
    <input type="email" id="email" name="email" required placeholder="exemple@domaine.com">

    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" required placeholder="••••••••">

    <button type="submit">Se connecter</button>
</form>
<p>Pas encore de compte ? <a href="{{ url_for('auth.inscription') }}">Inscrivez-vous ici</a>.</p>
{% endblock %}
