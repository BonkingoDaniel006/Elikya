<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation du paiement - BotayExpress</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='connexion.css') }}">
  <style>
    .loader { border: 8px solid #f3f3f3; border-top: 8px solid #ff4081; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-msg { text-align: center; font-family: sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <div class="status-msg">
    <h1>Paiement en cours...</h1>
    <div class="loader"></div>
    <p>Veuillez valider la transaction sur votre téléphone en saisissant votre code PIN.</p>
    <p><strong>Ne fermez pas cette page.</strong> Elle s'actualisera automatiquement dès confirmation.</p>
    <div id="error-box" style="color: red; display: none; margin-top: 20px;">
      Le paiement a échoué. Veuillez réessayer. <br>
      <a href="{{ url_for('panier.panier') }}">Retour au panier</a>
    </div>
  </div>

  <script>
    const referenceId = "{{ reference_id }}";
    
    function checkStatus() {
      fetch(`/api/check_status/${referenceId}`)
        .then(response => response.json())
        .then(data => {
          console.log("Statut actuel:", data.status);
          
          if (data.status === "True") {
            // SUCCÈS : On redirige vers la page de confirmation finale
            window.location.href = "{{ url_for('panier.paiement_finalise') }}";
          } else if (data.status === "Echoué") {
            // ÉCHEC : On arrête le polling et on montre l'erreur
            document.querySelector('.loader').style.display = 'none';
            document.getElementById('error-box').style.display = 'block';
            document.querySelector('h1').innerText = "Échec du paiement";
          } else {
            // EN ATTENTE : On re-vérifie dans 3 secondes
            setTimeout(checkStatus, 3000);
          }
        })
        .catch(err => {
          console.error("Erreur lors de la vérification:", err);
          setTimeout(checkStatus, 5000); // Réessayer un peu plus tard en cas de bug réseau
        });
    }

    // Lancer la première vérification après 5 secondes (laisser le temps à l'utilisateur de recevoir le push)
    setTimeout(checkStatus, 5000);
  </script>
</body>
</html>
