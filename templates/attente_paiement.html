<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation du paiement - Elikia</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='connexion.css') }}">
  <style>
    .loader { border: 8px solid #f3f3f3; border-top: 8px solid #ff4081; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .status-msg { text-align: center; font-family: sans-serif; padding: 20px; }
    .error-text { color: #dc3545; display: none; margin-top: 20px; font-weight: bold; }
    .btn-return { display: inline-block; background-color: #ff4081; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="status-msg">
    <h1 id="main-title">Paiement en cours...</h1>
    <div class="loader"></div>
    <p id="instruction-text">Veuillez valider la transaction sur votre téléphone en saisissant votre code PIN.</p>
    <p><strong>Ne fermez pas cette page.</strong> Elle s'actualisera automatiquement dès confirmation.</p>
    
    <div id="error-box" class="error-text">
      <span id="error-message">Le paiement a échoué ou a été annulé. Veuillez réessayer.</span> <br><br>
      <a href="{{ url_for('panier.panier') }}" class="btn-return">Retour au panier</a>
    </div>
  </div>

  <script>
    const referenceId = "{{ reference_id }}";
    let attempts = 0;
    const maxAttempts = 40; // 40 tentatives * 3 secondes = 120 secondes (2 minutes max)
    
    function checkStatus() {
      attempts++;
      
      // Sécurité : si le délai est dépassé sans réponse définitive du webhook
      if (attempts > maxAttempts) {
        stopPolling("Délai d'attente dépassé. Si vous avez été débité, contactez le support.");
        return;
      }

      fetch(`/api/check_status/${referenceId}`)
        .then(response => {
          if (!response.ok) throw new Error("Erreur réseau ou serveur");
          return response.json();
        })
        .then(data => {
          console.log(`[Vérification ${attempts}] Statut actuel :`, data.status);
          
          if (data.status === "True") {
            // SUCCÈS : L'écriture en BDD est faite, on redirige vers le succès final
            window.location.href = "{{ url_for('panier.paiement_finalise') }}";
          } else if (data.status === "Echoué") {
            // ÉCHEC : Le webhook Shwary a retourné failed ou cancelled
            stopPolling("Le paiement a été refusé ou annulé depuis le téléphone.");
          } else {
            // EN ATTENTE / PENDING : On continue le polling toutes les 3 secondes
            setTimeout(checkStatus, 3000);
          }
        })
        .catch(err => {
          console.error("Erreur lors de la vérification:", err);
          // En cas d'erreur réseau, on retente un peu plus tard (5 secondes) pour ne pas briser la boucle
          setTimeout(checkStatus, 5000);
        });
    }

    function stopPolling(message) {
      document.querySelector('.loader').style.display = 'none';
      document.getElementById('instruction-text').style.display = 'none';
      
      document.getElementById('error-message').innerText = message;
      document.getElementById('error-box').style.display = 'block';
      document.getElementById('main-title').innerText = "Opération interrompue";
    }

    // Premier déclenchement après 4 secondes (laisse le temps au Push USSD de s'afficher sur l'écran du client)
    setTimeout(checkStatus, 4000);
  </script>
</body>
</html>
